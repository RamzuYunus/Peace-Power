kind = "web"
previewPath = "/"
title = "Peace Power"
version = "1.0.0"
id = "artifacts/peace-power"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19225
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/peace-power run dev"

[services.env]
PORT = "19225"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/peace-power", "run", "build"]
publicDir = "artifacts/peace-power/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
